<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字孪生校园 - 浙江树人学院拱宸桥校区</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #000; }
#canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

#toolbar { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
.toolbar-btn { display: flex; align-items: center; gap: 5px; padding: 8px 16px; background: rgba(25,25,38,0.88); border: 1px solid rgba(255,255,255,0.18); border-radius: 22px; color: #ddd; font-size: 13px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; white-space: nowrap; }
.toolbar-btn:hover { background: rgba(50,50,70,0.9); border-color: rgba(255,255,255,0.35); transform: translateY(-1px); }
.toolbar-btn.active { background: rgba(60,120,240,0.65); border-color: rgba(90,150,255,0.7); color: #fff; }

#layer-panel { position: fixed; left: 16px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 6px; }
.layer-btn { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(25,25,38,0.88); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #ccc; font-size: 12px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; }
.layer-btn:hover { background: rgba(50,50,70,0.9); }
.layer-btn.on { color: #fff; border-color: rgba(100,200,100,0.45); }
.layer-btn.off { color: #555; border-color: rgba(255,100,100,0.25); }
.layer-dot { width: 8px; height: 8px; border-radius: 50%; }
.layer-dot.buildings { background: #5b9bd5; }
.layer-dot.roads { background: #999; }
.layer-dot.vegetation { background: #5cb85c; }
.layer-dot.facilities { background: #f0ad4e; }

#info-panel { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 100; width: 280px; background: rgba(18,18,32,0.92); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 20px; color: #fff; backdrop-filter: blur(14px); opacity: 0; pointer-events: none; transition: opacity 0.35s; }
#info-panel.visible { opacity: 1; pointer-events: all; }
#info-panel h3 { font-size: 18px; margin-bottom: 6px; color: #5b9bd5; }
#info-panel .tag { display: inline-block; background: rgba(91,155,213,0.25); color: #8ec5ff; padding: 2px 10px; border-radius: 10px; font-size: 11px; margin-bottom: 10px; }
#info-panel .desc { font-size: 13px; color: #aaa; line-height: 1.55; }
#info-panel .close-btn { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #777; font-size: 16px; cursor: pointer; }
#info-panel .close-btn:hover { color: #fff; }

#weather-bar { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; z-index: 100; }
.weather-label { color: rgba(255,255,255,0.7); font-size: 12px; margin-right: 4px; pointer-events: none; }

#campus-label { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); z-index: 99; text-align: center; pointer-events: none; color: #fff; }
#campus-label h1 { font-size: 26px; text-shadow: 0 2px 16px rgba(0,0,0,0.6); letter-spacing: 3px; }
#campus-label .sub { font-size: 12px; color: rgba(255,255,255,0.55); }

#stats { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; background: rgba(18,18,32,0.8); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 6px 16px; z-index: 100; color: #777; font-size: 11px; backdrop-filter: blur(8px); }
#stats span { color: #5b9bd5; }

#loading { position: fixed; inset: 0; background: #0a0a14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s; }
#loading.hidden { opacity: 0; pointer-events: none; }
#loading .spin { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #5b9bd5; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: #777; font-size: 13px; }

#tooltip { position: fixed; pointer-events: none; z-index: 200; background: rgba(0,0,0,0.82); color: #fff; padding: 5px 12px; border-radius: 7px; font-size: 12px; opacity: 0; transition: opacity 0.12s; }

.road-label { position: fixed; z-index: 90; color: rgba(255,255,255,0.6); font-size: 11px; pointer-events: none; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }

#minimap { position: fixed; top: 16px; left: 16px; z-index: 110; border-radius: 12px; border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 4px 24px rgba(0,0,0,0.5); background: rgba(10,10,20,0.85); backdrop-filter: blur(6px); pointer-events: none; }
#minimap-label { position: fixed; top: 18px; left: 22px; z-index: 111; color: rgba(255,255,255,0.7); font-size: 10px; pointer-events: none; font-weight: bold; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>拱宸桥校区数字孪生系统加载中...</p></div>

<div id="canvas-container"></div>

<div id="campus-label">
  <h1>浙江树人学院 · 拱宸桥校区</h1>
  <p class="sub">杭州市拱墅区树人街8号 &nbsp;|&nbsp; Digital Twin Campus</p>
</div>

<div id="toolbar">
  <button class="toolbar-btn active" data-view="perspective">🔍 透视视角</button>
  <button class="toolbar-btn" data-view="bird">🦅 鸟瞰视角</button>
  <button class="toolbar-btn" data-view="south-gate">🏛️ 南门视角</button>
  <button class="toolbar-btn" data-view="north">🏟️ 北校区视角</button>
  <button class="toolbar-btn" data-action="reset">🔄 重置</button>
</div>

<div id="weather-bar">
  <span class="weather-label">🌤️ 天气</span>
  <button class="toolbar-btn active" data-weather="sunny">☀️ 晴</button>
  <button class="toolbar-btn" data-weather="cloudy">☁️ 阴</button>
  <button class="toolbar-btn" data-weather="rain">🌧️ 雨</button>
  <button class="toolbar-btn" data-weather="snow">❄️ 雪</button>
  <button class="toolbar-btn" data-weather="fog">🌫️ 雾</button>
  <button class="toolbar-btn" data-weather="night">🌙 夜</button>
</div>

<div id="layer-panel">
  <button class="layer-btn on" data-layer="buildings"><span class="layer-dot buildings"></span>建筑</button>
  <button class="layer-btn on" data-layer="roads"><span class="layer-dot roads"></span>道路</button>
  <button class="layer-btn on" data-layer="vegetation"><span class="layer-dot vegetation"></span>植被</button>
  <button class="layer-btn on" data-layer="facilities"><span class="layer-dot facilities"></span>设施</button>
</div>

<div id="info-panel">
  <button class="close-btn">✕</button>
  <h3 id="info-title"></h3>
  <span class="tag" id="info-tag"></span>
  <p class="desc" id="info-desc"></p>
</div>

<div id="stats">场景对象: <span id="stat-objs">0</span> &nbsp;|&nbsp; 帧率: <span id="stat-fps">0</span> FPS</div>
<div id="tooltip"></div>
<canvas id="minimap" width="180" height="200"></canvas>
<div id="minimap-label">🗺️ 小地图</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.179.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.179.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const container = document.getElementById('canvas-container');
const infoPanel = document.getElementById('info-panel');
const infoTitle = document.getElementById('info-title');
const infoTag = document.getElementById('info-tag');
const infoDesc = document.getElementById('info-desc');
const tooltip = document.getElementById('tooltip');
const statObjs = document.getElementById('stat-objs');
const statFps = document.getElementById('stat-fps');
const minimap = document.getElementById('minimap');
const minimapCtx = minimap.getContext('2d');
const buildingMinimapPoints = [];
function addMinimapPoint(x, z, color, label) {
  buildingMinimapPoints.push({ x, z, color, label });
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec8e8);
scene.fog = new THREE.FogExp2(0x8ec8e8, 0.0012);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 500);
camera.position.set(60, 45, 80);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 160;
controls.maxPolarAngle = Math.PI * 0.47;
controls.update();

const ambient = new THREE.AmbientLight(0x8899bb, 0.9);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e8, 2.8);
sun.position.set(70, 50, 35);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 300;
sun.shadow.camera.left = -55;
sun.shadow.camera.right = 55;
sun.shadow.camera.top = 55;
sun.shadow.camera.bottom = -55;
sun.shadow.bias = -0.0001;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x8ec8e8, 0x445533, 0.5);
scene.add(hemi);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const interactiveObjects = [];
const buildingDataMap = new Map();
const layerGroups = {};

function layerGroup(name) {
  const g = new THREE.Group(); g.name = name;
  layerGroups[name] = g; scene.add(g); return g;
}
const buildingsGroup = layerGroup('buildings');
const roadsGroup = layerGroup('roads');
const vegetationGroup = layerGroup('vegetation');
const facilitiesGroup = layerGroup('facilities');

function regObj(mesh, data) {
  mesh.userData = data;
  mesh.castShadow = true; mesh.receiveShadow = true;
  buildingDataMap.set(mesh, data);
  interactiveObjects.push(mesh);
}

const gltfLoader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.179.0/examples/jsm/libs/draco/');
gltfLoader.setDRACOLoader(dracoLoader);
function loadGLBBuilding(path, x, z, scale, rotY, data) {
  gltfLoader.load(path, (gltf) => {
    const model = gltf.scene;
    const bbox = new THREE.Box3().setFromObject(model);
    const size = bbox.getSize(new THREE.Vector3());
    const center = bbox.getCenter(new THREE.Vector3());
    model.position.set(x - center.x, -bbox.min.y, z - center.z);
    model.scale.set(scale, scale, scale);
    if (rotY) model.rotation.y = rotY;
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    buildingsGroup.add(model);
    regObj(model, data);
    objCount++;
    statObjs.textContent = objCount;
    console.log(`📦 [GLB] ${data.name} loaded — 原始尺寸: ${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)}, 中心: (${center.x.toFixed(1)}, ${center.y.toFixed(1)}, ${center.z.toFixed(1)})`);
  }, undefined, (err) => {
    console.error(`❌ [GLB] ${path} 加载失败:`, err);
    createBuilding(x, z, 6, 4, 6, 0xff4444, data.name + ' (加载失败)', data.type, '模型加载失败，使用占位方块。');
  });
}

const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a8c4a, roughness: 0.85 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(180, 160), groundMat);
ground.rotation.x = -Math.PI/2; ground.position.y = -0.05; ground.receiveShadow = true; scene.add(ground);

function mat(c, r=0.3, m=0.05) { return new THREE.MeshStandardMaterial({ color:c, roughness:r, metalness:m }); }
function box(w,d,h,mt) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mt);
  m.position.y = h/2; m.castShadow = true; m.receiveShadow = true; return m;
}
function cyl(rt,rb,h,mt) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,16), mt);
  m.position.y = h/2; m.castShadow = true; m.receiveShadow = true; return m;
}
function winMat() { return new THREE.MeshStandardMaterial({ color:0xaaccee, roughness:0.2, emissive:0x111133, emissiveIntensity:0.3 }); }

function addWindows(group, w, d, h, frontZ) {
  const wm = winMat();
  for (let row=0; row<Math.floor(h/3.2); row++) {
    for (let col=0; col<Math.floor(w/3.2); col++) {
      const win = new THREE.Mesh(new THREE.PlaneGeometry(1.4,1.8), wm);
      win.position.set(-w/2+2+col*3.2, 2+row*3.2, frontZ);
      group.add(win);
      const wb = win.clone(); wb.position.z = -frontZ; group.add(wb);
    }
  }
}

function edgeStrip(group, w, d, h) {
  const em = mat(0x333333, 0.2, 0.5);
  const top = new THREE.Mesh(new THREE.BoxGeometry(w+0.3, 0.35, d+0.3), em);
  top.position.y = h; group.add(top);
  const bot = new THREE.Mesh(new THREE.BoxGeometry(w+0.5, 0.5, d+0.5), em);
  bot.position.y = 0.25; group.add(bot);
}

function createBuilding(x, z, w, d, h, color, name, type, desc) {
  const group = new THREE.Group();
  const bm = mat(color, 0.28);
  group.add(box(w, d, h, bm));
  edgeStrip(group, w, d, h);
  addWindows(group, w, d, h, d/2+0.01);
  group.position.set(x, 0, z);
  buildingsGroup.add(group);
  regObj(group, { name, type, desc, color });
  return group;
}

function tallBuilding(x, z, w, d, h, color, name, type, desc, extraH=0) {
  const group = new THREE.Group();
  const bm = mat(color, 0.25);
  const body = box(w, d, h, bm);
  group.add(body);
  if (extraH>0) {
    const topBox = new THREE.Mesh(new THREE.BoxGeometry(w*0.6, extraH, d*0.6), mat(color, 0.2, 0.3));
    topBox.position.y = h + extraH/2; topBox.castShadow = true; topBox.receiveShadow = true;
    group.add(topBox);
  }
  edgeStrip(group, w, d, h);
  addWindows(group, w, d, h, d/2+0.01);
  group.position.set(x, 0, z);
  buildingsGroup.add(group);
  regObj(group, { name, type, desc, color });
  return group;
}

function createRoad(x, z, w, h, dashed) {
  const rm = new THREE.MeshStandardMaterial({ color:0x444444, roughness:0.7 });
  const r = new THREE.Mesh(new THREE.PlaneGeometry(w, h), rm);
  r.rotation.x = -Math.PI/2; r.position.set(x, 0.01, z); r.receiveShadow = true;
  roadsGroup.add(r);
  if (dashed) {
    const lm = new THREE.MeshStandardMaterial({ color:0xcccccc, roughness:0.5 });
    for (let i=-h/2+3; i<h/2; i+=5) {
      const ln = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 2), lm);
      ln.rotation.x = -Math.PI/2; ln.position.set(x, 0.02, z+i); roadsGroup.add(ln);
    }
  }
}

function createSidewalk(x, z, w, h) {
  const sm = new THREE.MeshStandardMaterial({ color:0xc8b898, roughness:0.6 });
  const s = new THREE.Mesh(new THREE.PlaneGeometry(w, h), sm);
  s.rotation.x = -Math.PI/2; s.position.set(x, 0.015, z); s.receiveShadow = true;
  roadsGroup.add(s);
}

function createTree(x, z, sc=1) {
  const g = new THREE.Group();
  g.add(cyl(0.3*sc, 0.4*sc, 2.5*sc, mat(0x8B5A2B, 0.8)));
  const lc = [0x3a8a3a, 0x2d7a2d, 0x4a944a, 0x358035];
  const lm = new THREE.MeshStandardMaterial({ color:lc[Math.floor(Math.random()*lc.length)], roughness:0.7 });
  [[1.5*sc,3*sc,2.8*sc],[1.2*sc,2.5*sc,4.5*sc],[0.8*sc,1.8*sc,5.8*sc]].forEach(([r,h,y])=>{
    const c = new THREE.Mesh(new THREE.ConeGeometry(r,h,8), lm);
    c.position.y=y; c.castShadow=true; c.receiveShadow=true; g.add(c);
  });
  g.position.set(x,0,z); vegetationGroup.add(g); return g;
}

function createBush(x, z, s=1) {
  const g = new THREE.Group();
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.8*s,8,6), mat(0x4a8a4a,0.7));
  b.position.y=0.5*s; b.scale.set(1,0.6,1); b.castShadow=true; b.receiveShadow=true;
  g.add(b); g.position.set(x,0,z); vegetationGroup.add(g);
}

const buildingZones = [];
function addZone(x,z,w,d,margin=3) {
  buildingZones.push({
    xMin: x-w/2-margin, xMax: x+w/2+margin,
    zMin: z-d/2-margin, zMax: z+d/2+margin
  });
}
function isNearZone(bx,bz,margin=0) {
  return buildingZones.some(z=>bx>=z.xMin-margin && bx<=z.xMax-margin && bz>=z.zMin-margin && bz<=z.zMax-margin);
}

let objCount = 0;

// ═══════════════════════════════════════════
// 南校区 — 舟山东路以南 (z>0)
// ═══════════════════════════════════════════

// 南校门 — 树人街8号，南校区正南端
const southGate = new THREE.Group();
const gatePillarMat = mat(0xddccaa, 0.3);
[-5,5].forEach(px=>{
  const p = new THREE.Mesh(new THREE.BoxGeometry(1.2,7,1.2), gatePillarMat);
  p.position.set(px,3.5,0); p.castShadow=true; p.receiveShadow=true; southGate.add(p);
});
const gateBeam = new THREE.Mesh(new THREE.BoxGeometry(12,0.5,1.8), mat(0xbbaa88,0.3,0.5));
gateBeam.position.y=7; gateBeam.castShadow=true; southGate.add(gateBeam);
const gateSign = new THREE.Mesh(new THREE.BoxGeometry(5,1.2,0.25), mat(0x334488,0.3));
gateSign.position.set(0,5.5,1); southGate.add(gateSign);
southGate.position.set(0,0,70); facilitiesGroup.add(southGate);
regObj(southGate, {name:'南校门',type:'校园入口',desc:'浙江树人学院拱宸桥校区正门，位于杭州市拱墅区树人街8号。',color:0xddccaa});
addMinimapPoint(0, 70, 0xddccaa, '南校门');
addZone(0,70,12,3,2);
objCount++;

// 喷泉 — 南校门前广场
const fountain = new THREE.Group();
fountain.add(new THREE.Mesh(new THREE.CylinderGeometry(2.5,3,0.8,24), mat(0x888888,0.3,0.4)));
fountain.children[0].position.y=0.4;
fountain.add(new THREE.Mesh(new THREE.CylinderGeometry(2.3,2.3,0.25,24), mat(0x4488cc,0.1,0.3)));
fountain.children[1].position.y=0.9;
fountain.add(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.4,2.5,12), mat(0x999999,0.2,0.5)));
fountain.children[2].position.y=2.25;
fountain.add(new THREE.Mesh(new THREE.SphereGeometry(1,12,6,0,Math.PI*2,0,Math.PI/2), mat(0x888888,0.3,0.4)));
fountain.children[3].position.y=3.5;
const pGeo = new THREE.BufferGeometry();
const pCount = 150;
const pPos = new Float32Array(pCount*3);
const pVel = [];
for (let i=0; i<pCount; i++) {
  pPos[i*3]=(Math.random()-0.5)*1.2;
  pPos[i*3+1]=3.5+Math.random()*3;
  pPos[i*3+2]=(Math.random()-0.5)*1.2;
  pVel.push({vy:-(Math.random()*0.02+0.008),life:Math.random(),maxLife:1.2+Math.random()*1.8});
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat = new THREE.PointsMaterial({ color:0xaaddff, size:0.12, transparent:true, opacity:0.65, blending:THREE.AdditiveBlending, depthWrite:false });
const particles = new THREE.Points(pGeo,pMat);
fountain.add(particles);
fountain.userData.fp = {particles,velocities:pVel,positions:pPos};
fountain.position.set(0,0,40);
facilitiesGroup.add(fountain);
addZone(0,40,6,6,2);

// 旗杆
const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,10,12), mat(0xcccccc,0.3,0.6));
flagPole.position.set(-12,5,42); flagPole.castShadow=true; facilitiesGroup.add(flagPole);
const flagMesh = new THREE.Mesh(new THREE.PlaneGeometry(2,1.3), new THREE.MeshStandardMaterial({ color:0xcc2222, roughness:0.5, side:THREE.DoubleSide }));
flagMesh.position.set(-11,9.2,42); flagMesh.name='flag'; flagMesh.castShadow=true; facilitiesGroup.add(flagMesh);
addZone(-12,42,4,3,1);



// 贺田图书馆 — 南校区中央，标志性最高建筑

let selectedObj = null;

function onMouseMove(e) {
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(interactiveObjects,true);
  if (hits.length>0) {
    let o=hits[0].object;
    while(o&&!buildingDataMap.has(o)) o=o.parent;
    if (o&&buildingDataMap.has(o)) {
      document.body.style.cursor='pointer';
      tooltip.style.opacity='1';
      tooltip.style.left=(e.clientX+16)+'px';
      tooltip.style.top=(e.clientY-32)+'px';
      tooltip.textContent=buildingDataMap.get(o).name;
      return;
    }
  }
  document.body.style.cursor='default';
  tooltip.style.opacity='0';
}

function onClick(e) {
  if (e.target.closest('#toolbar')||e.target.closest('#weather-bar')||e.target.closest('#layer-panel')||e.target.closest('#info-panel')) return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(interactiveObjects,true);
  if (hits.length>0) {
    let o=hits[0].object;
    while(o&&!buildingDataMap.has(o)) o=o.parent;
    if (o&&buildingDataMap.has(o)) { showInfo(o); return; }
  }
  hideInfo();
}

function showInfo(obj) {
  const d = buildingDataMap.get(obj);
  if (!d) return;
  if (selectedObj&&selectedObj!==obj) resetHighlight(selectedObj);
  selectedObj=obj;
  obj.traverse(c=>{
    if (c.isMesh&&c.material.color) {
      c.material._oe=c.material.emissive?c.material.emissive.getHex():0;
      c.material._oei=c.material.emissiveIntensity||0;
      c.material.emissive=new THREE.Color(d.color);
      c.material.emissiveIntensity=0.3;
    }
  });
  infoTitle.textContent=d.name; infoTag.textContent=d.type; infoDesc.textContent=d.desc;
  infoPanel.classList.add('visible');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  if (selectedObj) { resetHighlight(selectedObj); selectedObj=null; }
}

function resetHighlight(obj) {
  obj.traverse(c=>{
    if (c.isMesh&&c.material._oe!==undefined) {
      c.material.emissive=new THREE.Color(c.material._oe);
      c.material.emissiveIntensity=c.material._oei;
      delete c.material._oe; delete c.material._oei;
    }
  });
}

function switchView(view) {
  const v=viewConfigs[view]; if(!v) return;
  controls.target.set(v.target[0],v.target[1],v.target[2]);
  const s=camera.position.clone(), e=new THREE.Vector3(v.pos[0],v.pos[1],v.pos[2]);
  const t0=performance.now(), dur=900;
  function anim(ts) {
    const t=Math.min((ts-t0)/dur,1);
    const ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    camera.position.lerpVectors(s,e,ease); controls.update();
    if(t<1) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
  document.querySelectorAll('.toolbar-btn[data-view]').forEach(b=>b.classList.remove('active'));
  const ab=document.querySelector(`.toolbar-btn[data-view="${view}"]`);
  if(ab) ab.classList.add('active');
}

let currentWeather = 'sunny';
let weatherTransition = null;

function lerpColor(color, target, t) {
  color.r += (target.r - color.r) * t;
  color.g += (target.g - color.g) * t;
  color.b += (target.b - color.b) * t;
}

function lerpVal(a, b, t) { return a + (b - a) * t; }

function switchWeather(weather) {
  if (weather === currentWeather && !weatherTransition) return;
  if (weatherTransition) return;
  const cfg = weatherConfigs[weather];
  if (!cfg) return;

  const from = {
    sky: scene.background.clone(),
    fog: scene.fog.color.clone(),
    fogDensity: scene.fog.density,
    ambientColor: ambient.color.clone(),
    ambientIntensity: ambient.intensity,
    sunColor: sun.color.clone(),
    sunIntensity: sun.intensity,
    hemiColor: hemi.color.clone(),
    hemiGround: hemi.groundColor.clone(),
    hemiIntensity: hemi.intensity
  };

  weatherTransition = { from, to: cfg, weather, start: performance.now(), duration: 1500 };

  document.querySelectorAll('#weather-bar .toolbar-btn[data-weather]').forEach(b => {
    b.classList.toggle('active', b.dataset.weather === weather);
  });

  if (cfg.rainRate > 0) {
    rainSystem.visible = true;
    rainVelocity = cfg.rainRate;
  } else {
    rainVelocity = cfg.rainRate;
  }
  if (cfg.snowRate > 0) {
    snowSystem.visible = true;
    snowVelocity = cfg.snowRate;
  } else {
    snowVelocity = cfg.snowRate;
  }

  currentWeather = weather;
}

function updateWeatherTransition(dt) {
  if (!weatherTransition) return;
  const elapsed = performance.now() - weatherTransition.start;
  const t = Math.min(elapsed / weatherTransition.duration, 1);
  const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

  const { from, to } = weatherTransition;

  scene.background = scene.background.clone();
  lerpColor(scene.background, to.sky, 0.1);

  lerpColor(scene.fog.color, to.fogColor, 0.1);
  scene.fog.density = lerpVal(scene.fog.density, to.fogDensity, 0.1);

  lerpColor(ambient.color, to.ambientColor, 0.1);
  ambient.intensity = lerpVal(ambient.intensity, to.ambientIntensity, 0.1);

  lerpColor(sun.color, to.sunColor, 0.1);
  sun.intensity = lerpVal(sun.intensity, to.sunIntensity, 0.1);

  lerpColor(hemi.color, to.hemiSky, 0.1);
  hemi.intensity = lerpVal(hemi.intensity, to.hemiIntensity, 0.1);

  if (t >= 1) {
    scene.background.copy(to.sky);
    scene.fog.color.copy(to.fogColor);
    scene.fog.density = to.fogDensity;
    ambient.color.copy(to.ambientColor);
    ambient.intensity = to.ambientIntensity;
    sun.color.copy(to.sunColor);
    sun.intensity = to.sunIntensity;
    hemi.color.copy(to.hemiSky);
    hemi.intensity = to.hemiIntensity;
    rainSystem.visible = to.rainRate === 0 ? false : true;
    snowSystem.visible = to.snowRate === 0 ? false : true;
    weatherTransition = null;
  }
}

const rainParticleCount = 2000;
const rainGeo = new THREE.BufferGeometry();
const rainPositions = new Float32Array(rainParticleCount * 3);
const rainDataArr = [];
for (let i = 0; i < rainParticleCount; i++) {
  rainPositions[i * 3] = (Math.random() - 0.5) * 120;
  rainPositions[i * 3 + 1] = Math.random() * 50;
  rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 140;
  rainDataArr.push({ speed: 20 + Math.random() * 30 });
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
const rainMat = new THREE.PointsMaterial({
  color: 0xaaccff,
  size: 0.15,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const rainSystem = new THREE.Points(rainGeo, rainMat);
rainSystem.visible = false;
scene.add(rainSystem);

let rainRate = 0;
let rainVelocity = 0;

function updateRain(dt) {
  if (rainVelocity === 0 && rainSystem.visible) {
    rainSystem.visible = false;
    return;
  }
  if (rainVelocity === 0) return;
  const pos = rainGeo.attributes.position.array;
  for (let i = 0; i < rainParticleCount; i++) {
    pos[i * 3 + 1] -= rainDataArr[i].speed * dt;
    if (pos[i * 3 + 1] < 0) {
      pos[i * 3 + 1] = 40 + Math.random() * 15;
      pos[i * 3] = (Math.random() - 0.5) * 120;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 140;
    }
  }
  rainGeo.attributes.position.needsUpdate = true;
}

const snowParticleCount = 1000;
const snowGeo = new THREE.BufferGeometry();
const snowPositions = new Float32Array(snowParticleCount * 3);
const snowDataArr = [];
for (let i = 0; i < snowParticleCount; i++) {
  snowPositions[i * 3] = (Math.random() - 0.5) * 120;
  snowPositions[i * 3 + 1] = Math.random() * 50;
  snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 140;
  snowDataArr.push({
    speed: 1.5 + Math.random() * 3,
    swaySpeed: 0.5 + Math.random() * 1.5,
    swayAmp: 0.3 + Math.random() * 0.8,
    swayPhase: Math.random() * Math.PI * 2
  });
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.4,
  transparent: true,
  opacity: 0.75,
  blending: THREE.NormalBlending,
  depthWrite: false
});
const snowSystem = new THREE.Points(snowGeo, snowMat);
snowSystem.visible = false;
scene.add(snowSystem);

let snowRate = 0;
let snowVelocity = 0;
let snowTime = 0;

function updateSnow(dt) {
  if (snowVelocity === 0 && snowSystem.visible) {
    snowSystem.visible = false;
    return;
  }
  if (snowVelocity === 0) return;
  snowTime += dt;
  const pos = snowGeo.attributes.position.array;
  for (let i = 0; i < snowParticleCount; i++) {
    const d = snowDataArr[i];
    pos[i * 3 + 1] -= d.speed * dt;
    pos[i * 3] += Math.sin(snowTime * d.swaySpeed + d.swayPhase) * d.swayAmp * dt;
    if (pos[i * 3 + 1] < 0) {
      pos[i * 3 + 1] = 40 + Math.random() * 15;
      pos[i * 3] = (Math.random() - 0.5) * 120;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 140;
    }
  }
  snowGeo.attributes.position.needsUpdate = true;
}

function drawMinimap() {
  const w = minimap.width, h = minimap.height;
  const ctx = minimapCtx;
  const mapX = (x) => (x + 70) / 140 * w;
  const mapZ = (z) => (z + 75) / 150 * h;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(15,25,15,0.9)';
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = 'rgba(50,50,50,0.4)';
  ctx.fillRect(mapX(-40), mapZ(-60), mapX(50)-mapX(-40), mapZ(60)-mapZ(-60));
  ctx.fillRect(mapX(-50), mapZ(-40), mapX(-10)-mapX(-50), mapZ(5)-mapZ(-40));
  ctx.fillRect(mapX(10), mapZ(-50), mapX(50)-mapX(10), mapZ(10)-mapZ(-50));

  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(mapX(-40), mapZ(5)); ctx.lineTo(mapX(50), mapZ(5));
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = 'bold 9px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('南校区', mapX(0), mapZ(40));
  ctx.fillText('北校区', mapX(0), mapZ(-25));
  ctx.fillText('舟山东路', mapX(50), mapZ(5));

  buildingMinimapPoints.forEach(p => {
    const px = mapX(p.x), pz = mapZ(p.z);
    const hex = '#' + new THREE.Color(p.color).getHexString();
    ctx.fillStyle = hex;
    ctx.beginPath();
    ctx.arc(px, pz, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0; camDir.normalize();
  const camFwd = new THREE.Vector3(camera.position.x, 0, camera.position.z).clone().add(camDir.clone().multiplyScalar(6));
  const cpx = mapX(camera.position.x), cpz = mapZ(camera.position.z);

  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(cpx, cpz, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  const fpx = mapX(camFwd.x), fpz = mapZ(camFwd.z);
  const angle = Math.atan2(fpz - cpz, fpx - cpx);
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(cpx + Math.cos(angle) * 4, cpz + Math.sin(angle) * 4);
  ctx.lineTo(cpx + Math.cos(angle + 2.4) * 6, cpz + Math.sin(angle + 2.4) * 6);
  ctx.lineTo(cpx + Math.cos(angle - 2.4) * 6, cpz + Math.sin(angle - 2.4) * 6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('N', mapX(0), mapZ(-70));
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mapX(0), mapZ(-70));
  ctx.lineTo(mapX(0), mapZ(-63));
  ctx.moveTo(mapX(0), mapZ(-70));
  ctx.lineTo(mapX(-2), mapZ(-66));
  ctx.moveTo(mapX(0), mapZ(-70));
  ctx.lineTo(mapX(2), mapZ(-66));
  ctx.stroke();
}

const tourPath = [
  { x:0, z:68 }, { x:-25, z:50 }, { x:25, z:50 },
  { x:20, z:30 }, { x:-20, z:30 },
  { x:0, z:10 }, { x:40, z:0 }, { x:25, z:0 },
  { x:-30, z:5 }, { x:30, z:5 },
  { x:-20, z:-15 }, { x:0, z:-10 },
  { x:0, z:-35 }, { x:-45, z:-10 },
  { x:-10, z:-60 }, { x:10, z:-60 }, { x:0, z:-70 },
];
let tourIdx = 0, tourT = 0;
const walkSpeed = 3;

const clock = new THREE.Clock();
let fc=0,ft=0;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  controls.update();

  updateWeatherTransition(dt);
  updateRain(dt);
  updateSnow(dt);

  // 小人巡游
  if (tourIdx < tourPath.length - 1) {
    const a = tourPath[tourIdx], b = tourPath[tourIdx + 1];
    const dx = b.x - a.x, dz = b.z - a.z, dist = Math.sqrt(dx * dx + dz * dz);
    tourT += dt * walkSpeed / Math.max(dist, 0.1);
    if (tourT >= 1) { tourT = 0; tourIdx++; }
    if (tourIdx < tourPath.length - 1) {
      const ca = tourPath[tourIdx], cb = tourPath[tourIdx + 1];
      person.position.set(
        ca.x + (cb.x - ca.x) * tourT, 0,
        ca.z + (cb.z - ca.z) * tourT
      );
      person.rotation.y = -Math.atan2(cb.x - ca.x, cb.z - ca.z);
    }
  } else {
    tourIdx = 0; tourT = 0;
  }
  const leg = person.userData.legs;
  leg[0].rotation.x = Math.sin(ts * 0.01) * 0.5;
  leg[1].rotation.x = -Math.sin(ts * 0.01) * 0.5;

  const fd=fountain.userData.fp;
  if (fd) {
    const pos=fd.particles.geometry.attributes.position.array;
    for (let i=0;i<fd.velocities.length;i++) {
      pos[i*3+1]+=fd.velocities[i].vy;
      fd.velocities[i].life+=dt;
      if (fd.velocities[i].life>=fd.velocities[i].maxLife) {
        pos[i*3]=(Math.random()-0.5)*1.2; pos[i*3+1]=3.5; pos[i*3+2]=(Math.random()-0.5)*1.2;
        fd.velocities[i].vy=-(Math.random()*0.02+0.008);
        fd.velocities[i].life=0; fd.velocities[i].maxLife=1.2+Math.random()*1.8;
      }
    }
    fd.particles.geometry.attributes.position.needsUpdate=true;
  }

  const fl=scene.getObjectByName('flag');
  if (fl) { fl.rotation.z=Math.sin(ts*0.003)*0.12; fl.rotation.y=Math.sin(ts*0.002)*0.08; }

  fc++;
  if (ts-ft>=1000) {
    statFps.textContent=Math.round(fc/((ts-ft)/1000));
    fc=0; ft=ts;
  }

  drawMinimap();

  renderer.render(scene,camera);
}
